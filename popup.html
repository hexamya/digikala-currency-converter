<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Digikala Currency Settings</title>
  <style>
    body {
      width: 220px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #333333;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #202124;
        color: #e8eaed;
      }
    }
    label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    select {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background-color: #fff;
      color: #333;
    }
    @media (prefers-color-scheme: dark) {
      select {
        background-color: #3c4043;
        color: #e8eaed;
        border-color: #5f6368;
      }
    }
    .header {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 15px;
      text-align: center;
      color: #ef394e; /* Digikala Red */
    }
  </style>
</head>
<body>
  <div class="header">Currency Converter</div>
  <label>
    Target Currency:
    <select id="currency-select">
      <option value="USD">USD ($)</option>
    </select>
  </label>
  <script src="popup.js"></script>
</body>
</html>
